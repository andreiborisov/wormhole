---
# ── Kernel modules ────────────────────────────────────────────────────────────

- name: Install linux-modules-extra
  ansible.builtin.apt:
    name: 'linux-modules-extra-{{ ansible_facts["kernel"] }}'
    state: present
    update_cache: true

- name: Persist tcp_hybla across reboots
  ansible.builtin.copy:
    content: "tcp_hybla\n"
    dest: /etc/modules-load.d/tcp_hybla.conf
    mode: '0644'

- name: Load tcp_hybla now
  community.general.modprobe:
    name: tcp_hybla
    state: present

# ── Host sysctls ──────────────────────────────────────────────────────────────

- name: Tune host sysctls
  ansible.posix.sysctl:
    name: '{{ item.name }}'
    value: '{{ item.value }}'
    state: present
    sysctl_file: /etc/sysctl.d/99-wormhole.conf
    reload: true
  loop:
    # Forwarding
    - { name: net.ipv4.ip_forward, value: '1' }
    - { name: net.ipv4.conf.all.src_valid_mark, value: '1' }
    - { name: net.ipv4.conf.all.rp_filter, value: '0' }
    - { name: net.ipv4.conf.default.rp_filter, value: '0' }
    # Networking
    - { name: net.core.somaxconn, value: '4096' }
    - { name: net.core.rmem_max, value: '67108864' }
    - { name: net.core.wmem_max, value: '67108864' }
    - { name: net.core.netdev_max_backlog, value: '250000' }
    # TCP tuning
    - { name: net.ipv4.tcp_syncookies, value: '1' }
    - { name: net.ipv4.tcp_tw_reuse, value: '1' }
    - { name: net.ipv4.tcp_fin_timeout, value: '30' }
    - { name: net.ipv4.tcp_keepalive_time, value: '1200' }
    - { name: net.ipv4.ip_local_port_range, value: '10000 65000' }
    - { name: net.ipv4.tcp_max_syn_backlog, value: '8192' }
    - { name: net.ipv4.tcp_max_tw_buckets, value: '5000' }
    - { name: net.ipv4.tcp_fastopen, value: '3' }
    - { name: net.ipv4.tcp_mem, value: '25600 51200 102400' }
    - { name: net.ipv4.tcp_rmem, value: '4096 87380 67108864' }
    - { name: net.ipv4.tcp_wmem, value: '4096 65536 67108864' }
    - { name: net.ipv4.tcp_mtu_probing, value: '1' }
    - { name: net.ipv4.tcp_slow_start_after_idle, value: '0' }
    - { name: net.ipv4.tcp_no_metrics_save, value: '1' }
    - { name: net.ipv4.tcp_congestion_control, value: 'hybla' }

# ── Docker official apt repository ───────────────────────────────────────────

- name: Install apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: 'https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }}/gpg'
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_facts["architecture"] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }} {{ ansible_facts["distribution_release"] }} stable


    state: present

- name: Install Docker, Docker Compose, and Python cryptography library
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - python3-cryptography
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# ── Directories ───────────────────────────────────────────────────────────────

- name: Create directories
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop:
    - '{{ deploy_dir }}/sing-box/data'
    - '{{ deploy_dir }}/sing-box/tls'
    - '{{ deploy_dir }}/amneziawg'
    - '{{ deploy_dir }}/router/nftables'

# ── AWG server key pair ───────────────────────────────────────────────────────

- name: Check if AWG private key exists
  ansible.builtin.stat:
    path: '{{ deploy_dir }}/amneziawg/private.key'
  register: _awg_key_stat

- name: Generate AWG private key via Docker
  ansible.builtin.shell: >-
    docker run --rm amneziavpn/amneziawg-go:{{ image_tags.amneziawg }} awg genkey > {{ deploy_dir }}/amneziawg/private.key


  when: not _awg_key_stat.stat.exists
  no_log: true

- name: Set permissions on AWG private key
  ansible.builtin.file:
    path: '{{ deploy_dir }}/amneziawg/private.key'
    mode: '0600'

- name: Slurp AWG private key
  ansible.builtin.slurp:
    src: '{{ deploy_dir }}/amneziawg/private.key'
  register: _awg_privkey_b64
  no_log: true

- name: Set awg_private_key fact
  ansible.builtin.set_fact:
    awg_private_key: '{{ _awg_privkey_b64.content | b64decode | trim }}'
  no_log: true

- name: Derive AWG public key via Docker
  ansible.builtin.shell: >-
    docker run --rm -i amneziavpn/amneziawg-go:{{ image_tags.amneziawg }} awg pubkey < {{ deploy_dir }}/amneziawg/private.key


  register: _awg_pubkey
  changed_when: false

- name: Set awg_public_key fact
  ansible.builtin.set_fact:
    awg_public_key: '{{ _awg_pubkey.stdout }}'

# ── TLS certificate (server-side, each node generates its own) ───────────────

- name: Generate TLS private key
  community.crypto.openssl_privatekey:
    path: '{{ deploy_dir }}/sing-box/tls/key.pem'
    type: RSA
    size: 4096
    mode: '0600'

- name: Generate certificate signing request
  community.crypto.openssl_csr:
    path: '{{ deploy_dir }}/sing-box/tls/csr.pem'
    privatekey_path: '{{ deploy_dir }}/sing-box/tls/key.pem'
    common_name: '{{ ansible_host }}'
    subject_alt_name:
      - 'IP:{{ ansible_host }}'
    basic_constraints:
      - 'CA:TRUE'
    basic_constraints_critical: true

- name: Generate self-signed TLS certificate
  community.crypto.x509_certificate:
    path: '{{ deploy_dir }}/sing-box/tls/cert.pem'
    privatekey_path: '{{ deploy_dir }}/sing-box/tls/key.pem'
    csr_path: '{{ deploy_dir }}/sing-box/tls/csr.pem'
    provider: selfsigned
    selfsigned_not_after: '+3650d'

# ── Peer key pairs (generated on controller, public keys sent to server) ──────

- name: Create local peer key directories
  ansible.builtin.file:
    path: '{{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}'
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Create local peer config directories
  ansible.builtin.file:
    path: '{{ playbook_dir }}/local/amneziawg/configs/{{ inventory_hostname }}'
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false

- name: Check if peer private keys exist
  ansible.builtin.stat:
    path: '{{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item }}.key'
  loop: '{{ awg.clients | default([]) }}'
  register: _peer_key_stats
  delegate_to: localhost
  become: false

- name: Generate peer private keys
  ansible.builtin.shell: |
    python3 -c "
    import base64, os
    from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
    key = X25519PrivateKey.generate()
    print(base64.b64encode(key.private_bytes_raw()).decode())
    " > {{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item.item }}.key
    chmod 0600 {{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item.item }}.key
  loop: '{{ _peer_key_stats.results }}'
  when: not item.stat.exists
  no_log: true
  delegate_to: localhost
  become: false

- name: Derive peer public keys
  ansible.builtin.shell: |
    python3 -c "
    import base64
    from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
    priv = base64.b64decode(open('{{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item }}.key').read().strip())
    pub = X25519PrivateKey.from_private_bytes(priv).public_key().public_bytes_raw()
    print(base64.b64encode(pub).decode())
    "
  loop: '{{ awg.clients | default([]) }}'
  register: _peer_pubkeys
  changed_when: false
  delegate_to: localhost
  become: false

- name: Build enriched peer list with public keys
  ansible.builtin.set_fact:
    awg_clients_with_keys: >-
      {%- set result = [] -%} {%- set _base = awg.subnet.split('/')[0].rsplit('.', 1)[0] -%} {%- for i in range((awg.clients | default([])) | length) -%}
        {%- set peer = (awg.clients | default([]))[i] -%}
        {%- set pubkey = _peer_pubkeys.results[i].stdout -%}
        {%- set _ = result.append({'name': peer, 'ip': _base ~ '.' ~ (100 + i), 'public_key': pubkey}) -%}
      {%- endfor -%} {{ result }}


# ── Config files ──────────────────────────────────────────────────────────────

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: '{{ deploy_dir }}/docker-compose.yml'
    mode: '0644'

- name: Deploy amneziawg Dockerfile
  ansible.builtin.template:
    src: amneziawg/Dockerfile.j2
    dest: '{{ deploy_dir }}/amneziawg/Dockerfile'
    mode: '0644'

- name: Deploy amneziawg entrypoint
  ansible.builtin.template:
    src: amneziawg/docker-entrypoint.fish
    dest: '{{ deploy_dir }}/amneziawg/docker-entrypoint.fish'
    mode: '0755'

- name: Deploy AWG interface config
  ansible.builtin.template:
    src: amneziawg/awg-in.conf.j2
    dest: '{{ deploy_dir }}/amneziawg/awg-in.conf'
    mode: '0600'
  notify: Restart amneziawg

- name: Deploy router Dockerfile
  ansible.builtin.template:
    src: router/Dockerfile
    dest: '{{ deploy_dir }}/router/Dockerfile'
    mode: '0644'

- name: Deploy router entrypoint
  ansible.builtin.template:
    src: router/docker-entrypoint.fish
    dest: '{{ deploy_dir }}/router/docker-entrypoint.fish'
    mode: '0755'

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: router/nftables/ruleset.nft.j2
    dest: '{{ deploy_dir }}/router/nftables/ruleset.nft'
    mode: '0644'

- name: Deploy sing-box config
  ansible.builtin.template:
    src: sing-box/config.json.j2
    dest: '{{ deploy_dir }}/sing-box/config.json'
    mode: '0644'
  notify: Restart sing-box

# ── Services ──────────────────────────────────────────────────────────────────

- name: Start services
  community.docker.docker_compose_v2:
    project_src: '{{ deploy_dir }}'
    state: present
    build: always

# ── Client configs (rendered locally) ────────────────────────────────────────

- name: Render client VPN configs
  ansible.builtin.template:
    src: amneziawg/client.conf.j2
    dest: '{{ playbook_dir }}/local/amneziawg/configs/{{ inventory_hostname }}/{{ awg_peer.name }}.conf'
    mode: '0600'
  loop: '{{ awg_clients_with_keys | default([]) }}'
  loop_control:
    loop_var: awg_peer
  vars:
    peer: '{{ awg_peer }}'
    peer_private_key: "{{ lookup('file', playbook_dir ~ '/local/amneziawg/keys/' ~ inventory_hostname ~ '/' ~ awg_peer.name ~ '.key') }}"
  delegate_to: localhost
  become: false
