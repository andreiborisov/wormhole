---
# ── Kernel modules ────────────────────────────────────────────────────────────

- name: Install linux-modules-extra
  ansible.builtin.apt:
    name: 'linux-modules-extra-{{ ansible_facts["kernel"] }}'
    state: present
    update_cache: true
  when: tcp_congestion_control == 'hybla'

- name: Persist tcp_hybla across reboots
  ansible.builtin.copy:
    content: "tcp_hybla\n"
    dest: /etc/modules-load.d/tcp_hybla.conf
    mode: '0644'
  when: tcp_congestion_control == 'hybla'

- name: Load tcp_hybla now
  community.general.modprobe:
    name: tcp_hybla
    state: present
  when: tcp_congestion_control == 'hybla'

# ── Host sysctls ──────────────────────────────────────────────────────────────

- name: Tune host sysctls
  ansible.posix.sysctl:
    name: '{{ item.name }}'
    value: '{{ item.value }}'
    state: present
    sysctl_file: /etc/sysctl.d/99-wormhole.conf
    reload: true
  loop:
    # Forwarding
    - { name: net.ipv4.ip_forward, value: '1' }
    - { name: net.ipv4.conf.all.src_valid_mark, value: '1' }
    - { name: net.ipv4.conf.all.rp_filter, value: '0' }
    - { name: net.ipv4.conf.default.rp_filter, value: '0' }
    # Networking
    - { name: net.core.somaxconn, value: '4096' }
    - { name: net.core.rmem_max, value: '67108864' }
    - { name: net.core.wmem_max, value: '67108864' }
    - { name: net.core.netdev_max_backlog, value: '250000' }
    # TCP tuning
    - { name: net.ipv4.tcp_syncookies, value: '1' }
    - { name: net.ipv4.tcp_tw_reuse, value: '1' }
    - { name: net.ipv4.tcp_fin_timeout, value: '30' }
    - { name: net.ipv4.tcp_keepalive_time, value: '1200' }
    - { name: net.ipv4.ip_local_port_range, value: '10000 65000' }
    - { name: net.ipv4.tcp_max_syn_backlog, value: '8192' }
    - { name: net.ipv4.tcp_max_tw_buckets, value: '5000' }
    - { name: net.ipv4.tcp_fastopen, value: '3' }
    - { name: net.ipv4.tcp_mem, value: '25600 51200 102400' }
    - { name: net.ipv4.tcp_rmem, value: '4096 87380 67108864' }
    - { name: net.ipv4.tcp_wmem, value: '4096 65536 67108864' }
    - { name: net.ipv4.tcp_mtu_probing, value: '1' }
    - { name: net.ipv4.tcp_slow_start_after_idle, value: '0' }
    - { name: net.ipv4.tcp_no_metrics_save, value: '1' }
    - { name: net.ipv4.tcp_congestion_control, value: '{{ tcp_congestion_control }}' }

# ── Docker official apt repository ───────────────────────────────────────────

- name: Install apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: 'https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }}/gpg'
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_facts["architecture"] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }} {{ ansible_facts["distribution_release"] }} stable


    state: present

- name: Install Docker, Docker Compose, and Python cryptography library
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - python3-cryptography
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# ── Directories ───────────────────────────────────────────────────────────────

- name: Create directories
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop:
    - '{{ deploy_dir }}/sing-box/data'
    - '{{ deploy_dir }}/sing-box/tls'
    - '{{ deploy_dir }}/amneziawg'
    - '{{ deploy_dir }}/router/nftables'

# ── AWG server key pair ───────────────────────────────────────────────────────

- name: Prepare AWG server keys and facts
  ansible.builtin.include_tasks:
    file: awg-server-keys.yml
    apply:
      tags:
        - awg-keys
        - client-configs
  tags:
    - awg-keys
    - client-configs

# ── TLS certificate (server-side, each node generates its own) ───────────────

- name: Generate TLS private key
  community.crypto.openssl_privatekey:
    path: '{{ deploy_dir }}/sing-box/tls/key.pem'
    type: RSA
    size: 4096
    mode: '0600'

- name: Generate certificate signing request
  community.crypto.openssl_csr:
    path: '{{ deploy_dir }}/sing-box/tls/csr.pem'
    privatekey_path: '{{ deploy_dir }}/sing-box/tls/key.pem'
    common_name: '{{ ansible_host }}'
    subject_alt_name:
      - 'IP:{{ ansible_host }}'
    basic_constraints:
      - 'CA:TRUE'
    basic_constraints_critical: true

- name: Generate self-signed TLS certificate
  community.crypto.x509_certificate:
    path: '{{ deploy_dir }}/sing-box/tls/cert.pem'
    privatekey_path: '{{ deploy_dir }}/sing-box/tls/key.pem'
    csr_path: '{{ deploy_dir }}/sing-box/tls/csr.pem'
    provider: selfsigned
    selfsigned_not_after: '+3650d'

# ── Client configs (rendered locally) ────────────────────────────────────────

- name: Render AWG client configs locally
  ansible.builtin.include_tasks:
    file: render-client-configs.yml
    apply:
      tags:
        - client-configs
  tags:
    - client-configs


# ── Config files ──────────────────────────────────────────────────────────────

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: '{{ deploy_dir }}/docker-compose.yml'
    mode: '0644'

- name: Deploy amneziawg Dockerfile
  ansible.builtin.template:
    src: amneziawg/Dockerfile.j2
    dest: '{{ deploy_dir }}/amneziawg/Dockerfile'
    mode: '0644'

- name: Deploy amneziawg entrypoint
  ansible.builtin.template:
    src: amneziawg/docker-entrypoint.fish
    dest: '{{ deploy_dir }}/amneziawg/docker-entrypoint.fish'
    mode: '0755'

- name: Deploy AWG interface config
  ansible.builtin.template:
    src: amneziawg/awg-in.conf.j2
    dest: '{{ deploy_dir }}/amneziawg/awg-in.conf'
    mode: '0600'
  notify: Restart amneziawg

- name: Deploy router Dockerfile
  ansible.builtin.template:
    src: router/Dockerfile
    dest: '{{ deploy_dir }}/router/Dockerfile'
    mode: '0644'

- name: Deploy router entrypoint
  ansible.builtin.template:
    src: router/docker-entrypoint.fish
    dest: '{{ deploy_dir }}/router/docker-entrypoint.fish'
    mode: '0755'

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: router/nftables/ruleset.nft.j2
    dest: '{{ deploy_dir }}/router/nftables/ruleset.nft'
    mode: '0644'

- name: Deploy sing-box config
  ansible.builtin.template:
    src: sing-box/config.json.j2
    dest: '{{ deploy_dir }}/sing-box/config.json'
    mode: '0644'
  notify: Restart sing-box

# ── Services ──────────────────────────────────────────────────────────────────

- name: Start services
  community.docker.docker_compose_v2:
    project_src: '{{ deploy_dir }}'
    state: present
    build: always

