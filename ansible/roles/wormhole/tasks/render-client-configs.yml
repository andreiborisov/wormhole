---
- name: Create local peer config directories
  ansible.builtin.file:
    path: '{{ playbook_dir }}/local/amneziawg/configs/{{ inventory_hostname }}'
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false

- name: Normalize AmneziaWG clients
  ansible.builtin.set_fact:
    awg_clients_normalized: >-
      {%- set result = [] -%}
      {%- for client in clients | default([]) -%}
        {%- set client_name = client.name if client is mapping else client -%}
        {%- set apply_rules = (client.apply_rules if (client is mapping and client.apply_rules is defined) else (awg.apply_rules_by_default | default(true))) | bool -%}
        {%- set _ = result.append({'name': client_name, 'apply_rules': apply_rules}) -%}
      {%- endfor -%}
      {{ result }}

- name: Check if peer private keys exist
  ansible.builtin.stat:
    path: '{{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item.name }}.key'
  loop: '{{ awg_clients_normalized | default([]) }}'
  register: _peer_key_stats
  delegate_to: localhost
  become: false

- name: Generate peer private keys
  ansible.builtin.shell: |
    python3 -c "
    import base64, os
    from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
    key = X25519PrivateKey.generate()
    print(base64.b64encode(key.private_bytes_raw()).decode())
    " > {{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item.item.name }}.key
    chmod 0600 {{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item.item.name }}.key
  loop: '{{ _peer_key_stats.results }}'
  when: not item.stat.exists
  no_log: true
  delegate_to: localhost
  become: false

- name: Derive peer public keys
  ansible.builtin.shell: |
    python3 -c "
    import base64
    from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
    priv = base64.b64decode(open('{{ playbook_dir }}/local/amneziawg/keys/{{ inventory_hostname }}/{{ item.name }}.key').read().strip())
    pub = X25519PrivateKey.from_private_bytes(priv).public_key().public_bytes_raw()
    print(base64.b64encode(pub).decode())
    "
  loop: '{{ awg_clients_normalized | default([]) }}'
  register: _peer_pubkeys
  changed_when: false
  delegate_to: localhost
  become: false

- name: Build enriched peer list with public keys
  ansible.builtin.set_fact:
    awg_clients_with_keys: >-
      {%- set result = [] -%} {%- set _base = awg.subnet.split('/')[0].rsplit('.', 1)[0] -%} {%- for i in range((awg_clients_normalized | default([])) | length) -%}
        {%- set peer = (awg_clients_normalized | default([]))[i] -%}
        {%- set pubkey = _peer_pubkeys.results[i].stdout -%}
        {%- set _ = result.append({'name': peer.name, 'apply_rules': peer.apply_rules, 'ip': _base ~ '.' ~ (100 + i), 'public_key': pubkey}) -%}
      {%- endfor -%} {{ result }}

- name: Render client VPN configs
  ansible.builtin.template:
    src: amneziawg/client.conf.j2
    dest: '{{ playbook_dir }}/local/amneziawg/configs/{{ inventory_hostname }}/{{ awg_peer.name }}.conf'
    mode: '0600'
  loop: '{{ awg_clients_with_keys | default([]) }}'
  loop_control:
    loop_var: awg_peer
  vars:
    peer: '{{ awg_peer }}'
    peer_private_key: "{{ lookup('file', playbook_dir ~ '/local/amneziawg/keys/' ~ inventory_hostname ~ '/' ~ awg_peer.name ~ '.key') }}"
  delegate_to: localhost
  become: false

- name: Create local WireGuard peer config directory
  ansible.builtin.file:
    path: '{{ playbook_dir }}/local/wireguard/configs/{{ inventory_hostname }}'
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  when: wg.subnet is defined

- name: Normalize WireGuard clients
  ansible.builtin.set_fact:
    wg_clients_normalized: >-
      {%- set result = [] -%}
      {%- for client in clients | default([]) -%}
        {%- set client_name = client.name if client is mapping else client -%}
        {%- set apply_rules = (client.apply_rules if (client is mapping and client.apply_rules is defined) else (wg.apply_rules_by_default | default(true))) | bool -%}
        {%- set _ = result.append({'name': client_name, 'apply_rules': apply_rules}) -%}
      {%- endfor -%}
      {{ result }}
  when: wg.subnet is defined

- name: Check if WireGuard peer private keys exist
  ansible.builtin.stat:
    path: '{{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}/{{ item.name }}.key'
  loop: '{{ wg_clients_normalized | default([]) }}'
  register: _wg_peer_key_stats
  delegate_to: localhost
  become: false
  when: wg.subnet is defined

- name: Generate WireGuard peer private keys
  ansible.builtin.shell: |
    python3 -c "
    import base64
    from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
    key = X25519PrivateKey.generate()
    print(base64.b64encode(key.private_bytes_raw()).decode())
    " > {{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}/{{ item.item.name }}.key
    chmod 0600 {{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}/{{ item.item.name }}.key
  loop: '{{ _wg_peer_key_stats.results | default([]) }}'
  when:
    - wg.subnet is defined
    - not item.stat.exists
  no_log: true
  delegate_to: localhost
  become: false

- name: Derive WireGuard peer public keys
  ansible.builtin.shell: |
    python3 -c "
    import base64
    from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
    priv = base64.b64decode(open('{{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}/{{ item.name }}.key').read().strip())
    pub = X25519PrivateKey.from_private_bytes(priv).public_key().public_bytes_raw()
    print(base64.b64encode(pub).decode())
    "
  loop: '{{ wg_clients_normalized | default([]) }}'
  register: _wg_peer_pubkeys
  changed_when: false
  delegate_to: localhost
  become: false
  when: wg.subnet is defined

- name: Build enriched WireGuard peer list with public keys
  ansible.builtin.set_fact:
    wireguard_clients_with_keys: >-
      {%- set result = [] -%} {%- set _base = wg.subnet.split('/')[0].rsplit('.', 1)[0] -%} {%- for i in range((wg_clients_normalized | default([])) | length) -%}
        {%- set peer = (wg_clients_normalized | default([]))[i] -%}
        {%- set pubkey = _wg_peer_pubkeys.results[i].stdout -%}
        {%- set _ = result.append({'name': peer.name, 'apply_rules': peer.apply_rules, 'ip': _base ~ '.' ~ (100 + i), 'public_key': pubkey}) -%}
      {%- endfor -%} {{ result }}
  when: wg.subnet is defined

- name: Render WireGuard client configs
  ansible.builtin.template:
    src: wireguard/client.conf.j2
    dest: '{{ playbook_dir }}/local/wireguard/configs/{{ inventory_hostname }}/{{ wg_peer.name }}.conf'
    mode: '0600'
  loop: '{{ wireguard_clients_with_keys | default([]) }}'
  loop_control:
    loop_var: wg_peer
  vars:
    peer: '{{ wg_peer }}'
    peer_private_key: "{{ lookup('file', playbook_dir ~ '/local/wireguard/keys/' ~ inventory_hostname ~ '/' ~ wg_peer.name ~ '.key') }}"
  delegate_to: localhost
  become: false
  when: wg.subnet is defined

- name: Render VLESS Reality client URI profiles
  ansible.builtin.template:
    src: vless/client-uri.txt.j2
    dest: '{{ playbook_dir }}/local/vless/configs/{{ inventory_hostname }}/{{ vless_peer.name }}.txt'
    mode: '0600'
  loop: '{{ vless_clients_with_credentials | default([]) }}'
  loop_control:
    loop_var: vless_peer
  vars:
    peer: '{{ vless_peer }}'
  delegate_to: localhost
  become: false
  when:
    - (vless_clients_with_credentials | default([]) | length) > 0
