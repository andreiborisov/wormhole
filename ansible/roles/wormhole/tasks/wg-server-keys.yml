---
- name: Create local WireGuard key directory
  ansible.builtin.file:
    path: '{{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}'
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Check if local WireGuard server private key exists
  ansible.builtin.stat:
    path: '{{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}/server.key'
  register: _local_wg_server_key_stat
  delegate_to: localhost
  become: false

- name: Generate local WireGuard server private key
  ansible.builtin.shell: |
    set -eu
    key_path="{{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}/server.key"
    wg genkey > "$key_path"
    chmod 0600 "$key_path"
  when: not _local_wg_server_key_stat.stat.exists
  no_log: true
  environment:
    PATH: '/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin'
  delegate_to: localhost
  become: false

- name: Set wg_private_key fact
  ansible.builtin.set_fact:
    wg_private_key: "{{ lookup('file', playbook_dir ~ '/local/wireguard/keys/' ~ inventory_hostname ~ '/server.key') | trim }}"
  no_log: true

- name: Derive WireGuard public key locally
  ansible.builtin.shell: |
    key_path="{{ playbook_dir }}/local/wireguard/keys/{{ inventory_hostname }}/server.key"
    wg pubkey < "$key_path"
  register: _wg_pubkey
  changed_when: false
  environment:
    PATH: '/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin'
  delegate_to: localhost
  become: false

- name: Set wg_public_key fact
  ansible.builtin.set_fact:
    wg_public_key: '{{ _wg_pubkey.stdout }}'
