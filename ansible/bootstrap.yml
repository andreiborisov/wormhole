---
# One-time bootstrap: uploads your SSH public key to fresh servers that only
# have root password access, then disables password authentication.
#
# Usage:
#   ansible-playbook bootstrap.yml
#
# You will be prompted for:
#   - The root password (same for all hosts, or per-host if they differ — see below)
#   - The path to your SSH public key

- name: Bootstrap SSH key authentication
  hosts: all
  gather_facts: false
  vars_prompt:
    - name: root_password
      prompt: "Root password (same for all hosts)"
      private: true
    - name: ssh_public_key_path
      prompt: "Path to SSH public key"
      default: "~/.ssh/id_ed25519.pub"
      private: false
  vars:
    ansible_password: "{{ root_password }}"
    ansible_ssh_common_args: "-o PreferredAuthentications=password -o PubkeyAuthentication=no"
  tasks:
    - name: Upload SSH public key
      ansible.posix.authorized_key:
        user: "{{ ansible_user }}"
        key: "{{ lookup('file', ssh_public_key_path) }}"
        state: present

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart sshd

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
