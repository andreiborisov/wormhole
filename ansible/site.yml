---
# Full provisioning: installs Docker, generates TLS certs/keys, and deploys
# sing-box + AWG/WireGuard on all nodes.
#
# Usage:
#   ansible-playbook site.yml --ask-vault-pass
#   ansible-playbook site.yml --ask-vault-pass --tags client-configs

- name: Provision all nodes
  hosts: all
  roles:
    - wormhole
