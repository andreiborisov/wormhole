---
# Render AWG client configs without full deployment.
#
# Usage:
#   ansible-playbook render-client-configs.yml --ask-vault-pass

- name: Render AWG client configs
  hosts: all
  tasks:
    - name: Prepare AWG server keys and facts
      ansible.builtin.include_role:
        name: wormhole
        tasks_from: awg-server-keys.yml

    - name: Render client configs locally
      ansible.builtin.include_role:
        name: wormhole
        tasks_from: render-client-configs.yml
